oraculum:
  llm:
    common:
      temperature: 0.1
      provider-fallback-order:
        - groq
        - gemini
    providers:
      groq:
        api-key: ${GROQ_API_KEY:}
      gemini:
        api-key: ${GEMINI_API_KEY:}
    models:
      mini:
        groq: "llama-3.1-8b-instant"
        gemini: "gemini-2.5-flash"
    retry:
      max-retries: 1
      initial-backoff-ms: 1000
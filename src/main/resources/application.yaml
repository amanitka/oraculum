spring:
  application:
    name: oraculum

  datasource:
    url: jdbc:postgresql://${ORACULUM_DATABASE_HOST}:${ORACULUM_DATABASE_PORT}/${ORACULUM_DATABASE_NAME}
    username: ${ORACULUM_DATABASE_USERNAME}
    password: ${ORACULUM_DATABASE_PASSWORD}

  kafka:
    bootstrap-servers: ${ORACULUM_KAFKA_BROKERS}
    consumer:
      group-id: oraculum
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

  flyway:
    enabled: false
    schemas: ${FLYWAY_DEFAULT_SCHEMA}
    default-schema: ${FLYWAY_DEFAULT_SCHEMA}

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

vaadin:
  launch-browser: true

oraculum:
  database:
    host: ${ORACULUM_DATABASE_HOST}
    port: ${ORACULUM_DATABASE_PORT}
    name: ${ORACULUM_DATABASE_NAME}
    username: ${ORACULUM_DATABASE_USERNAME}
    password: ${ORACULUM_DATABASE_PASSWORD}

  simfin:
    apiKey: ${ORACULUM_SIMFIN_API_KEY}
    chunkSize: ${ORACULUM_SIMFIN_CHUNK_SIZE:500000}
    refreshDays: ${ORACULUM_SIMFIN_REFRESH_DAYS:1}

  alphaVantage:
    apiUrl: https://www.alphavantage.co
    apiKey: ${ORACULUM_ALPHA_VANTAGE_API_KEY}

  kafka:
    consumerGroup: oraculum
    topics:
      ticker: oraculum.ticker
      dataFileReady: oraculum.data_file_ready
      market: oraculum.market
      industry: oraculum.industry

  shared:
    folderPath: ${ORACULUM_SHARED_FOLDER_PATH:./data/shared}

  analyst:
    refresh:
      priceCron: "0 7 * * *"
      fundamentalsCron: "0 0 * * 0"
      tickerCron: "0 0 1 * *"
    cleanup:
      dataCleanupCron: "${ORACULUM_DATA_CLEANUP_CRON:0 3 * * *}"
      dataRetentionDays: ${ORACULUM_DATA_RETENTION_DAYS:3}

  llm:
    # A list of all available model deployments.
    # 'alias' groups them into tiers. 'order' defines failover priority within a tier.
    deployments:
      # --- Tier 1: Flash Models (for simple, high-volume tasks) ---
      - alias: "flash-tier"
        model: "gemini-2.5-flash-lite"
        api_key: ${GEMINI_API_KEY}
        api_base: "https://generativelanguage.googleapis.com/v1beta/"
        order: 1 # Primary: Newest, agentic, and extremely cheap.
      - alias: "flash-tier"
        model: "gpt-4o-mini"
        api_key: ${OPENAI_API_KEY}
        api_base: "https://api.openai.com/v1"
        order: 2 # Fallback: OpenAI's cost-effective model.

      # --- Tier 2: Pro Models (for robust analysis) ---
      - alias: "pro-tier"
        model: "gemini-2.5-flash"
        api_key: ${GEMINI_API_KEY}
        api_base: "https://generativelanguage.googleapis.com/v1beta/"
        order: 1 # Primary: Google's newest production model for agentic work.
      - alias: "pro-tier"
        model: "gpt-4o"
        api_key: ${OPENAI_API_KEY}
        api_base: "https://api.openai.com/v1"
        order: 2 # Fallback: Powerful OpenAI model.

      # --- Tier 3: Specialist Models (for critical synthesis) ---
      - alias: "specialist-tier"
        model: "gemini-3.1-pro-preview"
        api_key: ${GEMINI_API_KEY}
        api_base: "https://generativelanguage.googleapis.com/v1beta/"
        order: 1 # Primary: Flagship model for the most complex tasks.
      - alias: "specialist-tier"
        model: "gpt-4o"
        api_key: ${OPENAI_API_KEY}
        api_base: "https://api.openai.com/v1"
        order: 2 # Fallback: Cross-provider failover to a powerful OpenAI model.

    # Global settings applied to all calls via the router
    router_settings:
      temperature: 0.0
      num_retries: 3
      workflow_token_budget: 100000
      max_tokens: 8192

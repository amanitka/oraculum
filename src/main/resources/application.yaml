spring:
  threads:
    virtual:
      enabled: true
  application:
    name: oraculum

  datasource:
    url: jdbc:postgresql://${ORACULUM_DATABASE_HOST}:${ORACULUM_DATABASE_PORT}/${ORACULUM_DATABASE_NAME}
    username: ${ORACULUM_DATABASE_USERNAME}
    password: ${ORACULUM_DATABASE_PASSWORD}

  kafka:
    bootstrap-servers: ${ORACULUM_KAFKA_BROKERS}
    consumer:
      group-id: oraculum
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

  flyway:
    enabled: true
    schemas: ${FLYWAY_DEFAULT_SCHEMA}
    default-schema: ${FLYWAY_DEFAULT_SCHEMA}

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false

vaadin:
  launch-browser: true

oraculum:
  data:
    refresh-enabled: true
    metadata:
      cron: "0 0 1 1 * *"
    company:
      cron: "0 0 2 * * TUE"
    fundamentals:
      cron: "0 0 2 * * TUE"
    share-price:
      incremental-window-days: 10
      cron: "0 0 3 * * TUE-SAT"
    news:
      incremental-window-hours: 1
      cron: "0 0 */4 * * *"

  database:
    host: ${ORACULUM_DATABASE_HOST}
    port: ${ORACULUM_DATABASE_PORT}
    name: ${ORACULUM_DATABASE_NAME}
    username: ${ORACULUM_DATABASE_USERNAME}
    password: ${ORACULUM_DATABASE_PASSWORD}
    maintenance:
      enabled: true
      vacuum-cron: "0 0 4 * * SUN"
      partition-cron: "0 0 5 1 * *"
      mv-refresh-cron: "0 0 4 * * TUE-SAT"

  simfin:
    api-key: ${ORACULUM_SIMFIN_API_KEY}
    chunk-size: ${ORACULUM_SIMFIN_CHUNK_SIZE:500000}
    refresh-days: ${ORACULUM_SIMFIN_REFRESH_DAYS:1}

  alpha-vantage:
    api-url: https://www.alphavantage.co
    api-key: ${ORACULUM_ALPHA_VANTAGE_API_KEY}

  kafka:
    consumer-group: oraculum
    topics:
      data-file-ready: oraculum.data_file_ready
      market: oraculum.market
      industry: oraculum.industry
      news: oraculum.news
      harvester-request: oraculum.harvester.request
      analyst-request: oraculum.analyst.request

  analyst:
    token-budget: 100000
    cleanup:
      data-cleanup-cron: ${ORACULUM_DATA_CLEANUP_CRON:0 3 * * *}
      data-retention-days: ${ORACULUM_DATA_RETENTION_DAYS:3}
    fact-sheet:
      history-limit: 3660
    share-price:
      monthly-history-limit: 3660
      daily-history-limit: 30
    news:
      history-limit: 30

  harvester:
    export-path: ${ORACULUM_HARVESTER_EXPORT_PATH:./data/harvester}
    export-cleanup:
      enabled: ${ORACULUM_HARVESTER_EXPORT_CLEANUP_ENABLED:true}
      retention-days: ${ORACULUM_HARVESTER_EXPORT_RETENTION_DAYS:1}
      cron: ${ORACULUM_HARVESTER_EXPORT_CLEANUP_CRON:0 0 2 * * *}

  llm:
    common:
      temperature: 0.0
      max-completion-tokens: 8192
      timeout: 120
      provider-fallback-order:
        - gemini
        - openai
        - groq

    retry:
      max-retries: 2
      initial-backoff-ms: 1000

    providers:
      gemini:
        base-url: "https://generativelanguage.googleapis.com/v1beta/openai/"
        api-key: ${GEMINI_API_KEY}

      groq:
        base-url: "https://api.groq.com/openai/v1"
        api-key: ${GROQ_API_KEY}

      openai:
        base-url: "https://api.openai.com/v1"
        api-key: ${OPENAI_API_KEY}

    models:
      mini:
        gemini: "gemini-3.1-flash-lite"
        groq: "llama-3.1-8b-instant"
        openai: "gpt-5.4-nano"

      standard:
        gemini: "gemini-3.5-flash"
        groq: "llama-3.1-70b-versatile"
        openai: "gpt-5.4-mini"

      pro:
        gemini: "gemini-3.1-pro-preview"
        groq: "llama-3.3-70b"
        openai: "gpt-5.4"
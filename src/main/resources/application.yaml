logging:
  level:
    com.oraculum.harvester.config.RestClientLoggingInterceptor: INFO

spring:
  autoconfigure:
    exclude:
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioSpeechAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioTranscriptionAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiChatAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiEmbeddingAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiImageAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiModerationAutoConfiguration

  threads:
    virtual:
      enabled: true

  application:
    name: oraculum

  datasource:
    url: jdbc:postgresql://${ORACULUM_DATABASE_HOST}:${ORACULUM_DATABASE_PORT}/${ORACULUM_DATABASE_NAME}
    username: ${ORACULUM_DATABASE_USERNAME}
    password: ${ORACULUM_DATABASE_PASSWORD}
    hikari:
      max-lifetime: 540000 # 9 minutes (shorter than the default 30 mins)

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false

  kafka:
    bootstrap-servers: ${ORACULUM_KAFKA_BROKERS}
    consumer:
      group-id: oraculum
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

  flyway:
    enabled: true
    schemas: ${ORACULUM_FLYWAY_DEFAULT_SCHEMA:public}
    default-schema: ${ORACULUM_FLYWAY_DEFAULT_SCHEMA:public}

resilience4j:
  retry:
    retry-aspect-order: 399
    instances:
      llm:
        max-attempts: 4
        wait-duration: 2s
        enable-exponential-backoff: true
        ignore-exceptions:
          - org.springframework.web.client.HttpClientErrorException.TooManyRequests
          - org.springframework.web.reactive.function.client.WebClientResponseException.TooManyRequests
          - com.openai.errors.RateLimitException
      fredApi:
        max-attempts: 3
        wait-duration: 2s
        enable-exponential-backoff: true
        retry-exceptions:
          - org.springframework.web.client.RestClientException
          - java.io.IOException
      alphaVantageApi:
        max-attempts: 3
        wait-duration: 2s
        enable-exponential-backoff: true
        retry-exceptions:
          - org.springframework.web.client.RestClientException
          - java.io.IOException
  timelimiter:
    time-limiter-aspect-order: 400
    instances:
      llm:
        timeout-duration: 300s
        cancel-running-future: true

vaadin:
  launch-browser: true

oraculum:
  oauth2:
    keycloak:
      client-id: ${ORACULUM_OAUTH_KEYCLOAK_CLIENT_ID:}
      client-secret: ${ORACULUM_OAUTH_KEYCLOAK_CLIENT_SECRET:}
      issuer-uri: ${ORACULUM_OAUTH_KEYCLOAK_ISSUER_URI:}
      scopes: ${ORACULUM_OAUTH_KEYCLOAK_SCOPES:openid,profile,email}
    google:
      client-id: ${ORACULUM_OAUTH_GOOGLE_CLIENT_ID:}
      client-secret: ${ORACULUM_OAUTH_GOOGLE_CLIENT_SECRET:}
      scopes: ${ORACULUM_OAUTH_GOOGLE_SCOPES:openid,profile,email}

  data:
    refresh-enabled: true
    metadata:
      cron: "0 0 1 1 * *"
    company:
      cron: "0 0 2 * * TUE"
    fundamentals:
      cron: "0 0 2 * * TUE"
    share-price:
      incremental-window-days: 10
      cron: "0 0 3 * * TUE-SAT"
    news:
      incremental-window-hours: 1
      cron: "0 0 2,8,14,22 * * *"
    insider-transactions:
      cron: "0 0 4,16 * * *"
    macroeconomic:
      cron: "0 0 6 * * *"
    sec-documents:
      cron: "0 0 * * * *"


  database:
    host: ${ORACULUM_DATABASE_HOST}
    port: ${ORACULUM_DATABASE_PORT}
    name: ${ORACULUM_DATABASE_NAME}
    username: ${ORACULUM_DATABASE_USERNAME}
    password: ${ORACULUM_DATABASE_PASSWORD}
    maintenance:
      enabled: true
      vacuum-cron: "0 0 4 * * SUN"
      partition-cron: "0 0 5 1 * *"
      mv-refresh-cron: "0 0 4 * * TUE-SAT"

  kafka:
    consumer-group: ${ORACULUM_KAFKA_CONSUMER_GROUP:oraculum}
    topics:
      data-file-ready: ${ORACULUM_KAFKA_TOPIC_DATA_FILE_READY:oraculum.data_file_ready}
      market: ${ORACULUM_KAFKA_TOPIC_MARKET:oraculum.market}
      industry: ${ORACULUM_KAFKA_TOPIC_INDUSTRY:oraculum.industry}
      news: ${ORACULUM_KAFKA_TOPIC_NEWS:oraculum.news}
      harvester-request: ${ORACULUM_KAFKA_TOPIC_HARVESTER_REQUEST:oraculum.harvester.request}

  analyst:
    token-budget: 100000
    cleanup:
      data-cleanup-cron: ${ORACULUM_DATA_CLEANUP_CRON:0 3 * * *}
      data-retention-days: ${ORACULUM_DATA_RETENTION_DAYS:3}
    fact-sheet:
      annual-history-limit: 3650
      quarterly-history-limit: 1825
    share-price:
      monthly-history-limit: 1825
      daily-history-limit: 30
    news:
      history-limit: 30
      article-limit: 50
    critic:
      max-reruns: 1
      max-specialists-per-rerun: 3
    insider:
      transaction-history-limit: 180

  harvester:
    exchange-directory: ${ORACULUM_HARVESTER_EXCHANGE_DIRECTORY:/app/exchange}
    exchange-cleanup:
      enabled: ${ORACULUM_HARVESTER_EXCHANGE_CLEANUP_ENABLED:true}
      retention-days: ${ORACULUM_HARVESTER_EXCHANGE_RETENTION_DAYS:1}
      cron: ${ORACULUM_HARVESTER_EXCHANGE_CLEANUP_CRON:0 0 2 * * *}
    alpha-vantage:
      api-key: ${ORACULUM_ALPHA_VANTAGE_API_KEY}
      base-url: "https://www.alphavantage.co"
      daily-limit: 25
      reserved-calls: 3
    fred:
      api-key: ${ORACULUM_FRED_API_KEY}
      base-url: "https://api.stlouisfed.org/fred"
      history-limit-years: 10

  llm:
    common:
      temperature: 0.0
      max-completion-tokens: 8192
      provider-fallback-order:
        - lmstudio
        - gemini
        - deepseek
        - openai

    providers:
      lmstudio:
        base-url: ${ORACULUM_LMSTUDIO_BASE_URL:http://10.10.1.3:1234/v1}
        api-key: ${ORACULUM_LMSTUDIO_API_KEY:lmstudio}

      gemini:
        base-url: "https://generativelanguage.googleapis.com/v1beta/openai/"
        api-key: ${ORACULUM_GEMINI_API_KEY}

      deepseek:
        base-url: "https://api.deepseek.com"
        api-key: ${ORACULUM_DEEPSEEK_API_KEY}

      groq:
        base-url: "https://api.groq.com/openai/v1"
        api-key: ${ORACULUM_GROQ_API_KEY}

      openai:
        base-url: "https://api.openai.com/v1"
        api-key: ${ORACULUM_OPENAI_API_KEY}

    models:
      mini:
        lmstudio: "gemma-4-12b"
        gemini: "gemini-3.5-flash-lite"
        deepseek: "deepseek-v4-flash"
        groq: "llama-3.1-8b-instant"
        openai: "gpt-5.4-nano"

      standard:
        gemini: "gemini-3.6-flash"
        groq: "llama-3.1-70b-versatile"
        deepseek: "deepseek-v4-flash"
        openai: "gpt-5.4-mini"

      pro:
        gemini: "gemini-3.1-pro-preview"
        groq: "llama-3.3-70b"
        deepseek: "deepseek-v4-pro"
        openai: "gpt-5.4"

spring:
  application:
    name: oraculum

  datasource:
    url: jdbc:postgresql://${ORACULUM_DATABASE_HOST}:${ORACULUM_DATABASE_PORT}/${ORACULUM_DATABASE_NAME}
    username: ${ORACULUM_DATABASE_USERNAME}
    password: ${ORACULUM_DATABASE_PASSWORD}

  kafka:
    bootstrap-servers: ${ORACULUM_KAFKA_BROKERS}
    consumer:
      group-id: oraculum
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

  flyway:
    enabled: true
    schemas: ${FLYWAY_DEFAULT_SCHEMA}
    default-schema: ${FLYWAY_DEFAULT_SCHEMA}

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

vaadin:
  launch-browser: true

oraculum:
  database:
    host: ${ORACULUM_DATABASE_HOST}
    port: ${ORACULUM_DATABASE_PORT}
    name: ${ORACULUM_DATABASE_NAME}
    username: ${ORACULUM_DATABASE_USERNAME}
    password: ${ORACULUM_DATABASE_PASSWORD}

  simfin:
    api-key: ${ORACULUM_SIMFIN_API_KEY}
    chunk-size: ${ORACULUM_SIMFIN_CHUNK_SIZE:500000}
    refresh-days: ${ORACULUM_SIMFIN_REFRESH_DAYS:1}

  alpha-vantage:
    api-url: https://www.alphavantage.co
    api-key: ${ORACULUM_ALPHA_VANTAGE_API_KEY}

  kafka:
    consumer-group: oraculum
    topics:
      data-file-ready: oraculum.data_file_ready
      market: oraculum.market
      industry: oraculum.industry
      news: oraculum.news
      harvester-request: oraculum.harvester.request
      analyst-request: oraculum.analyst.request

  shared:
    folder-path: ${ORACULUM_SHARED_FOLDER_PATH:./data/shared}

  analyst:
    token-budget: 4000
    refresh:
      price-cron: "0 7 * * *"
      fundamentals-cron: "0 0 * * 0"
      ticker-cron: "0 0 1 * *"
    cleanup:
      data-cleanup-cron: "${ORACULUM_DATA_CLEANUP_CRON:0 3 * * *}"
      data-retention-days: ${ORACULUM_DATA_RETENTION_DAYS:3}
    fact-sheet:
      history-limit: 100

  llm:
    common:
      temperature: 0.0
      provider-fallback-order:
        - gemini
        - groq
        - openai

    retry:
      max-retries: 2
      initial-backoff-ms: 1000

    providers:
      gemini:
        base-url: "https://generativelanguage.googleapis.com/v1beta/openai/"
        api-key: ${GEMINI_API_KEY}

      groq:
        base-url: "https://api.groq.com/openai/v1"
        api-key: ${GROQ_API_KEY}

      openai:
        base-url: "https://api.openai.com/v1"
        api-key: ${OPENAI_API_KEY}

    models:
      mini:
        gemini: "gemini-2.5-flash-lite"
        groq: "llama-3.1-8b-instant"
        openai: "gpt-4o-mini"

      standard:
        gemini: "gemini-2.5-flash"
        groq: "llama-3.1-70b-versatile"
        openai: "gpt-4o"

      pro:
        gemini: "gemini-3.1-pro-preview"
        groq: "llama-3.3-70b"
        openai: "gpt-4.1"